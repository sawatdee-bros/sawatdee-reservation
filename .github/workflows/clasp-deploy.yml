name: Deploy GAS (予約メール)

on:
  push:
    branches: [main]
    paths:
      - 'apps_script/**'
      - '.clasp.json'
      - '.claspignore'
      - '.github/workflows/clasp-deploy.yml'
  workflow_dispatch: {}

# 同時実行を1本に絞る（連続 push でデプロイレース防止）
concurrency:
  group: clasp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install clasp
        run: npm install -g @google/clasp@3.3.0

      - name: Write clasp credentials
        env:
          CLASPRC: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC" ]; then
            echo "::error::CLASPRC_JSON secret is empty. Register it under repo Settings → Secrets."
            exit 1
          fi
          printf '%s' "$CLASPRC" > ~/.clasprc.json
          chmod 600 ~/.clasprc.json

      - name: Push to Apps Script
        run: clasp push -f

      - name: Deploy (update existing deployment, keep same URL)
        run: |
          STAMP=$(date -u +%Y-%m-%dT%H:%MZ)
          clasp deploy \
            --deploymentId AKfycby-XxQG9nd3Y-TykIv14Z-QR8zDfJ0_1wNfklNh58j1TWSSkT70KaWxHpbxC_gEy9HMqA \
            --description "GitHub Actions $STAMP"
