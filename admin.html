<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 2026-05-15: PWA mode メタタグ追加。kitchen.html (PWA) からの cross-origin iframe overlay 表示で、
     これらがないと iOS Safari が「外部サイトへのナビゲーション」と判定して Web Sheet を強制起動してしまう。
     勤怠サイト（既に同メタタグあり）が iframe で問題なく表示できているのと挙動を揃える。 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="サワディ兄弟 予約">
<title>予約管理 - サワディ兄弟</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding-bottom: 60px; }

header { background: #1e293b; padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
.back-btn { color: #94a3b8; text-decoration: none; font-size: 20px; line-height: 1; }
header h1 { font-size: 16px; font-weight: 600; color: #f1f5f9; flex: 1; }
.head-link { color: #94a3b8; text-decoration: none; font-size: 13px; padding: 6px 10px; border: 1px solid #334155; border-radius: 8px; }
.head-link:hover { color: #f1f5f9; border-color: #475569; }

/* 月ナビ */
.month-bar { background: #1e293b; padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #334155; }
.month-nav { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 8px; padding: 6px 14px; font-size: 18px; cursor: pointer; line-height: 1; }
.month-nav:hover { border-color: #166534; }
.month-label { flex: 1; text-align: center; font-size: 15px; font-weight: 700; color: #f1f5f9; }
.month-today-btn { background: #166534; color: white; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }

/* カレンダーグリッド */
.calendar { background: #1e293b; padding: 8px 12px 14px; border-bottom: 1px solid #334155; }
.dow-header-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 6px 0 8px; }
.dow-header { text-align: center; font-size: 10px; font-weight: 700; color: #64748b; letter-spacing: 0.08em; }
.dow-header.sun { color: #f87171; }
.dow-header.sat { color: #60a5fa; }

.month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.month-cell { background: #0f172a; border: 1px solid #1e293b; border-radius: 8px; padding: 5px 6px 4px; cursor: pointer; position: relative; min-height: 64px; display: flex; flex-direction: column; justify-content: space-between; transition: 0.12s; }
.month-cell:hover { border-color: #475569; }
.month-cell.other-month { opacity: 0.32; }
.month-cell.today { border-color: #475569; box-shadow: inset 0 0 0 1px #475569; }
.month-cell.selected { background: #166534; border-color: #166534; }
.month-cell.selected:hover { border-color: #14532d; }
.month-cell.closed { background: #111827; }
.month-cell.closed .cell-day { color: #475569; }
.month-cell.selected.closed { background: #166534; }
.month-cell.selected.closed .cell-day { color: #d1fae5; }

.cell-day { font-size: 14px; font-weight: 700; color: #e2e8f0; line-height: 1; }
.cell-day.sun { color: #f87171; }
.cell-day.sat { color: #60a5fa; }
.month-cell.selected .cell-day,
.month-cell.selected .cell-day.sun,
.month-cell.selected .cell-day.sat { color: white !important; }

.cell-summary { font-size: 11px; line-height: 1.25; text-align: right; }
.cell-count { font-weight: 700; color: #f1f5f9; }
.cell-party { color: #94a3b8; }
.month-cell.selected .cell-count,
.month-cell.selected .cell-party { color: white; }
.cell-closed-mark { font-size: 9px; color: #64748b; text-align: right; }
.month-cell.selected .cell-closed-mark { color: #d1fae5; }

.cell-pending-dot { position: absolute; top: 6px; right: 6px; width: 6px; height: 6px; border-radius: 50%; background: #fbbf24; }

/* 選択日ヘッダ・フィルタ */
.day-list-header { background: #0f172a; padding: 10px 16px 8px; font-size: 14px; color: #f1f5f9; font-weight: 700; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 10px; }
.day-list-header .dow-tag { font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 999px; background: #1e293b; color: #94a3b8; }
.day-list-header .dow-tag.sun { color: #f87171; }
.day-list-header .dow-tag.sat { color: #60a5fa; }
.day-list-header .dow-tag.closed { background: #7f1d1d; color: #fecaca; }
.day-list-header .meta { margin-left: auto; font-size: 12px; font-weight: 500; color: #94a3b8; }

.filter-bar { padding: 10px 16px; background: #0f172a; border-bottom: 1px solid #334155; display: flex; gap: 6px; overflow-x: auto; white-space: nowrap; }
.filter-pill { background: #1e293b; color: #94a3b8; border: 1px solid #334155; border-radius: 999px; padding: 6px 12px; font-size: 12px; cursor: pointer; flex-shrink: 0; }
.filter-pill:hover { color: #f1f5f9; }
.filter-pill.active { background: #166534; color: white; border-color: #166534; }
.filter-pill .count { display: inline-block; margin-left: 6px; background: rgba(0,0,0,0.2); padding: 0 6px; border-radius: 999px; font-size: 10px; }
.filter-pill.active .count { background: rgba(255,255,255,0.2); }

/* 既存：予約カード */
main { padding: 14px 16px; max-width: 760px; margin: 0 auto; }
.summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
.summary-cell { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 10px 8px; text-align: center; }
.summary-num { font-size: 20px; font-weight: 700; color: #f1f5f9; }
.summary-label { font-size: 10px; color: #64748b; margin-top: 2px; letter-spacing: 0.05em; }

.r-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 14px; margin-bottom: 10px; position: relative; }
.r-card.cancelled { opacity: 0.55; }
.r-card.no_show { opacity: 0.6; border-color: #7f1d1d; }
.r-card.confirmed { border-color: #166534; }

.r-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
.r-time { font-size: 18px; font-weight: 700; color: #f1f5f9; }
.r-party { font-size: 14px; color: #cbd5e1; font-weight: 600; }
.r-status { margin-left: auto; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; }
.r-status.pending { background: #fef3c7; color: #92400e; }
.r-status.confirmed { background: #d1fae5; color: #166534; }
.r-status.cancelled { background: #fee2e2; color: #991b1b; }
.r-status.no_show { background: #1f2937; color: #94a3b8; border: 1px solid #475569; }

.r-info { display: grid; grid-template-columns: 70px 1fr; gap: 4px 12px; margin-bottom: 12px; font-size: 13px; }
.r-info dt { color: #64748b; }
.r-info dd { color: #e2e8f0; }
.r-info dd a { color: #60a5fa; text-decoration: none; }
.r-info .note { white-space: pre-wrap; word-wrap: break-word; }

.r-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.act-btn { padding: 8px 14px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #cbd5e1; font-size: 13px; font-weight: 600; cursor: pointer; flex: 1; min-width: 80px; }
.act-btn:hover { border-color: #94a3b8; }
.act-btn.confirm { background: #166534; color: white; border-color: #166534; }
.act-btn.confirm:hover { background: #14532d; }
.act-btn.cancel { color: #ef4444; }
.act-btn.cancel:hover { border-color: #ef4444; background: rgba(239,68,68,0.06); }
.act-btn.noshow { color: #f59e0b; }
.act-btn.noshow:hover { border-color: #f59e0b; }

.r-id { position: absolute; top: 10px; right: 12px; font-family: 'Menlo', monospace; font-size: 10px; color: #64748b; }

.mail-badge { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; vertical-align: middle; margin-left: 6px; }
.mail-badge.sent { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
.mail-badge.pending { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }

.empty-state { text-align: center; padding: 30px 20px; color: #64748b; font-size: 13px; }
.loading { text-align: center; padding: 60px 20px; color: #64748b; }
.error-msg { background: #7f1d1d; color: #fecaca; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }

.toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); padding: 10px 22px; border-radius: 20px; font-size: 13px; font-weight: 600; display: none; z-index: 200; white-space: nowrap; max-width: 90vw; }
.toast.show { display: block; }
.toast.ok { background: #166534; color: white; }
.toast.err { background: #991b1b; color: #fecaca; }
/* 祝日表示 */
.cell-day.holiday { color: #f87171; }
.month-cell.selected .cell-day.holiday { color: white !important; }
.cell-holiday-name { font-size: 9px; color: #fca5a5; line-height: 1.1; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.month-cell.selected .cell-holiday-name { color: #fecaca; }
.month-cell.closed .cell-holiday-name { color: #94a3b8; }
</style>
<!-- 国民の祝日判定ライブラリ（クライアント側計算・1955-2150対応・年次メンテ不要）
     attendance リポと同バージョン pin で運用 -->
<script src="https://cdn.jsdelivr.net/npm/japanese-holidays@1.0.10/lib/japanese-holidays.js"></script>
</head>
<body>

<header>
  <a class="back-btn" href="#" onclick="window.parent.postMessage({type:'setMode',mode:'all'},'*');return false;" title="キッチンへ戻る">←</a>
  <h1>📋 予約管理</h1>
  <a class="head-link" href="settings.html">設定</a>
</header>

<div class="month-bar">
  <button class="month-nav" onclick="changeMonth(-1)" title="前月">‹</button>
  <div class="month-label" id="month-label">—</div>
  <button class="month-nav" onclick="changeMonth(1)" title="翌月">›</button>
  <button class="month-today-btn" onclick="goToday()">今日</button>
</div>

<div class="calendar">
  <div class="dow-header-row">
    <div class="dow-header sun">日</div>
    <div class="dow-header">月</div>
    <div class="dow-header">火</div>
    <div class="dow-header">水</div>
    <div class="dow-header">木</div>
    <div class="dow-header">金</div>
    <div class="dow-header sat">土</div>
  </div>
  <div class="month-grid" id="month-grid"></div>
</div>

<div class="day-list-header" id="day-list-header"></div>
<div class="filter-bar" id="filter-bar"></div>

<div class="toast" id="toast"></div>

<main>
  <div class="summary" id="summary" style="display:none"></div>
  <div id="content" class="loading">読み込み中...</div>
</main>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, get, update, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FC = {
  apiKey: 'AIzaSyBVfIZ_pUXqNAUljPBdsNlmVxkPEjvtUZQ',
  authDomain: 'sawatdee-bros.firebaseapp.com',
  databaseURL: 'https://sawatdee-bros-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId: 'sawatdee-bros',
  storageBucket: 'sawatdee-bros.firebasestorage.app',
  messagingSenderId: '1026345346676',
  appId: '1:1026345346676:web:98478c02d3dfbae3df310e'
};
const TENANT_ID = 'sawatdee-bros';

const app = initializeApp(FC);
const db = getDatabase(app);

const FILTERS = [
  { key: 'all', label: '全て' },
  { key: 'pending', label: '受付待ち' },
  { key: 'confirmed', label: '確定' },
  { key: 'no_show', label: '来店なし' },
  { key: 'cancelled', label: 'キャンセル' }
];
const STATUS_LABELS = { pending: '受付待ち', confirmed: '確定', cancelled: 'キャンセル', no_show: '来店なし' };
const DOW_LABELS = ['日', '月', '火', '水', '木', '金', '土'];

let currentYear, currentMonth;          // 表示中の月（month: 1-12）
let selectedDate = todayStr();          // 選択中の日付（YYYY-MM-DD）
let monthBookings = {};                 // { 'YYYY-MM-DD': [bookingObj, ...] }
let currentFilter = 'all';
let SETTINGS = {};                      // reservation_settings 全体

(function initMonthFromToday() {
  const d = new Date();
  currentYear = d.getFullYear();
  currentMonth = d.getMonth() + 1;
})();

// URL クエリ ?filter=xxx で初期フィルタ指定（POSキッチンのバッジから飛んできた時等）
(function initFilterFromQuery() {
  try {
    const params = new URLSearchParams(window.location.search);
    const f = params.get('filter');
    if (f && FILTERS.some(x => x.key === f)) {
      currentFilter = f;
    }
  } catch (e) { /* no-op */ }
})();

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
}
function pad2(n) { return String(n).padStart(2, '0'); }
function fmtClockShort(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return pad2(d.getHours()) + ':' + pad2(d.getMinutes());
}
function escHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// 国民の祝日判定（attendance リポと同実装・japanese-holidays ライブラリ計算）
const _holidayCache = {};
function getHoliday(ymdStr) {
  if (ymdStr in _holidayCache) return _holidayCache[ymdStr];
  if (!window.JapaneseHolidays) { _holidayCache[ymdStr] = null; return null; }
  const [y, m, d] = ymdStr.split('-').map(Number);
  const result = window.JapaneseHolidays.isHoliday(new Date(y, m - 1, d));
  _holidayCache[ymdStr] = result || null;
  return _holidayCache[ymdStr];
}

function dateOf(year, month, day) {
  return year + '-' + pad2(month) + '-' + pad2(day);
}

function showToast(msg, ok) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (ok ? 'ok' : 'err') + ' show';
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ---- 休業判定（settings の closed_dows / closed_dates） ----
function isClosedDate(dateStr) {
  if (SETTINGS.closed_dates && SETTINGS.closed_dates.indexOf(dateStr) !== -1) return true;
  const dow = new Date(dateStr + 'T00:00:00').getDay();
  if (SETTINGS.closed_dows && SETTINGS.closed_dows.indexOf(dow) !== -1) return true;
  return false;
}

// ---- データ取得 ----
async function loadSettings() {
  try {
    const snap = await get(ref(db, 'tenants/' + TENANT_ID + '/reservation_settings'));
    SETTINGS = snap.val() || {};
  } catch (e) {
    SETTINGS = {};
  }
}

async function loadMonth(year, month) {
  // 月一括取得：tenants/{tid}/reservations 全体を一度取得して、当月分をフィルタ。
  // データ量が増えたら orderBy "$key" 範囲取得に置換予定（要 .indexOn ".key" Rules）。
  document.getElementById('content').className = 'loading';
  document.getElementById('content').textContent = '読み込み中...';
  document.getElementById('summary').style.display = 'none';
  try {
    const snap = await get(ref(db, 'tenants/' + TENANT_ID + '/reservations'));
    const all = snap.val() || {};
    const prefix = year + '-' + pad2(month) + '-';
    const next = {};
    Object.keys(all).forEach(date => {
      if (date.indexOf(prefix) !== 0) return;
      const day = all[date] || {};
      const list = Object.keys(day).map(id => Object.assign({ id }, day[id]));
      list.sort((a, b) => (a.start_time || '').localeCompare(b.start_time || ''));
      next[date] = list;
    });
    monthBookings = next;
    renderAll();
  } catch (e) {
    monthBookings = {};
    renderCalendar();
    renderDayHeader();
    renderFilters({ all: 0, pending: 0, confirmed: 0, cancelled: 0, no_show: 0 });
    document.getElementById('content').className = '';
    document.getElementById('content').innerHTML = '<div class="error-msg">読み込み失敗: ' + escHtml(e.message) + '</div>';
  }
}

// ---- 月カレンダー描画 ----
function renderMonthLabel() {
  document.getElementById('month-label').textContent = currentYear + '年' + currentMonth + '月';
}

function renderCalendar() {
  renderMonthLabel();
  const firstDow = new Date(currentYear, currentMonth - 1, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  const totalCells = Math.ceil((firstDow + daysInMonth) / 7) * 7;
  const today = todayStr();
  const grid = document.getElementById('month-grid');
  grid.innerHTML = '';
  for (let i = 0; i < totalCells; i++) {
    const dayNum = i - firstDow + 1;
    let cellYear = currentYear, cellMonth = currentMonth, cellDay = dayNum;
    if (dayNum < 1) {
      // 前月
      const prev = new Date(currentYear, currentMonth - 2, 1);
      const prevDays = new Date(prev.getFullYear(), prev.getMonth() + 1, 0).getDate();
      cellYear = prev.getFullYear();
      cellMonth = prev.getMonth() + 1;
      cellDay = prevDays + dayNum;
    } else if (dayNum > daysInMonth) {
      // 翌月
      const nx = new Date(currentYear, currentMonth, 1);
      cellYear = nx.getFullYear();
      cellMonth = nx.getMonth() + 1;
      cellDay = dayNum - daysInMonth;
    }
    const dateStr = dateOf(cellYear, cellMonth, cellDay);
    const dow = new Date(dateStr + 'T00:00:00').getDay();
    const isOther = (dayNum < 1) || (dayNum > daysInMonth);
    const isToday = dateStr === today;
    const isSelected = dateStr === selectedDate;
    const closed = isClosedDate(dateStr);
    const list = monthBookings[dateStr] || [];
    const activeList = list.filter(b => b.status !== 'cancelled');
    const partyTotal = list.filter(b => b.status === 'pending' || b.status === 'confirmed')
                           .reduce((s, b) => s + (b.party_size || 0), 0);
    const hasPending = list.some(b => b.status === 'pending');

    const cls = ['month-cell'];
    if (isOther) cls.push('other-month');
    if (isToday) cls.push('today');
    if (isSelected) cls.push('selected');
    if (closed) cls.push('closed');

    const holiday = getHoliday(dateStr);

    const dayClsParts = ['cell-day'];
    if (closed) {
      // closed のスタイルは .month-cell.closed .cell-day で別途定義済み
    } else if (holiday) dayClsParts.push('holiday');
    else if (dow === 0) dayClsParts.push('sun');
    else if (dow === 6) dayClsParts.push('sat');

    let summaryHtml = '';
    if (activeList.length > 0) {
      summaryHtml = '<div class="cell-summary">'
        + '<div class="cell-count">' + activeList.length + '件</div>'
        + '<div class="cell-party">' + partyTotal + '名</div>'
        + '</div>';
    } else if (closed) {
      summaryHtml = '<div class="cell-closed-mark">休業</div>';
    } else {
      summaryHtml = '<div class="cell-summary"><div class="cell-party">—</div></div>';
    }

    const holidayHtml = holiday
      ? '<div class="cell-holiday-name" title="' + escHtml(holiday) + '">' + escHtml(holiday) + '</div>'
      : '';

    const cell = document.createElement('div');
    cell.className = cls.join(' ');
    cell.dataset.date = dateStr;
    cell.innerHTML =
      '<div class="' + dayClsParts.join(' ') + '">' + cellDay + '</div>'
      + holidayHtml
      + summaryHtml
      + (hasPending ? '<div class="cell-pending-dot" title="受付待ちあり"></div>' : '');
    cell.addEventListener('click', () => selectDate(dateStr));
    grid.appendChild(cell);
  }
}

// ---- 選択日ヘッダ ----
function renderDayHeader() {
  const el = document.getElementById('day-list-header');
  const dow = new Date(selectedDate + 'T00:00:00').getDay();
  const dowLabel = DOW_LABELS[dow];
  const closed = isClosedDate(selectedDate);
  const list = monthBookings[selectedDate] || [];
  const active = list.filter(b => b.status !== 'cancelled');
  const partyTotal = list.filter(b => b.status === 'pending' || b.status === 'confirmed')
                         .reduce((s, b) => s + (b.party_size || 0), 0);
  const tagCls = ['dow-tag'];
  if (dow === 0) tagCls.push('sun');
  if (dow === 6) tagCls.push('sat');
  if (closed) tagCls.push('closed');
  el.innerHTML =
    '<span>' + selectedDate + '</span>'
    + '<span class="' + tagCls.join(' ') + '">' + dowLabel + (closed ? '・休業' : '') + '</span>'
    + '<span class="meta">' + active.length + '件 / ' + partyTotal + '名</span>';
}

// ---- フィルタ・サマリ・カードリスト ----
function counts() {
  const list = monthBookings[selectedDate] || [];
  const c = { all: list.length, pending: 0, confirmed: 0, cancelled: 0, no_show: 0 };
  list.forEach(b => { if (c[b.status] != null) c[b.status]++; });
  return c;
}
function totalParty() {
  const list = monthBookings[selectedDate] || [];
  return list.filter(b => b.status === 'confirmed' || b.status === 'pending').reduce((s, b) => s + (b.party_size || 0), 0);
}

function renderFilters(c) {
  const html = FILTERS.map(f => {
    const cls = ['filter-pill'];
    if (f.key === currentFilter) cls.push('active');
    return '<div class="' + cls.join(' ') + '" data-f="' + f.key + '">' + f.label + ' <span class="count">' + (c[f.key] || 0) + '</span></div>';
  }).join('');
  document.getElementById('filter-bar').innerHTML = html;
  document.querySelectorAll('[data-f]').forEach(el => {
    el.addEventListener('click', () => {
      currentFilter = el.dataset.f;
      renderListAndSummary();
    });
  });
}

function renderSummary(c) {
  const sum = document.getElementById('summary');
  sum.style.display = 'grid';
  sum.innerHTML =
    '<div class="summary-cell"><div class="summary-num">' + c.all + '</div><div class="summary-label">予約数</div></div>'
    + '<div class="summary-cell"><div class="summary-num">' + (c.pending + c.confirmed) + '</div><div class="summary-label">有効</div></div>'
    + '<div class="summary-cell"><div class="summary-num">' + totalParty() + '</div><div class="summary-label">合計人数</div></div>'
    + '<div class="summary-cell"><div class="summary-num">' + c.pending + '</div><div class="summary-label">受付待ち</div></div>';
}

function renderListAndSummary() {
  const c = counts();
  renderFilters(c);
  renderSummary(c);
  const all = monthBookings[selectedDate] || [];
  const list = currentFilter === 'all' ? all : all.filter(b => b.status === currentFilter);
  const root = document.getElementById('content');
  root.className = '';
  if (list.length === 0) {
    root.innerHTML = '<div class="empty-state">' + (all.length === 0 ? 'この日の予約はありません' : '該当する予約はありません') + '</div>';
    return;
  }
  root.innerHTML = list.map(renderCard).join('');
  root.querySelectorAll('[data-act]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const act = btn.dataset.act;
      handleAction(id, act);
    });
  });
}

function mailStatusBadge(b) {
  if (b.email_sent_at) {
    return ' <span class="mail-badge sent">✉ 送信済 ' + fmtClockShort(b.email_sent_at) + '</span>';
  }
  if (b.status === 'confirmed' && b.email) {
    return ' <span class="mail-badge pending">✉ 未送信</span>';
  }
  return '';
}

function renderCard(b) {
  const status = b.status || 'pending';
  const phone = b.phone || '';
  const phoneHref = phone ? phone.replace(/[^0-9+]/g, '') : '';
  const email = b.email || '';
  const idShort = (b.id || '').slice(-6).toUpperCase();
  let actions = '';
  if (status === 'pending') {
    actions =
      '<button class="act-btn confirm" data-act="confirm" data-id="' + b.id + '">確定</button>'
      + '<button class="act-btn cancel" data-act="cancel" data-id="' + b.id + '">キャンセル</button>';
  } else if (status === 'confirmed') {
    actions = '<button class="act-btn noshow" data-act="no_show" data-id="' + b.id + '">来店なし</button>';
    if (email) {
      actions += '<button class="act-btn" data-act="resend_email" data-id="' + b.id + '" title="メール再送信">✉ 再送</button>';
    }
    actions +=
      '<button class="act-btn" data-act="revert_pending" data-id="' + b.id + '">受付待ちに戻す</button>'
      + '<button class="act-btn cancel" data-act="cancel" data-id="' + b.id + '">キャンセル</button>';
  } else if (status === 'cancelled' || status === 'no_show') {
    actions = '<button class="act-btn" data-act="revert_pending" data-id="' + b.id + '">受付待ちに戻す</button>';
  }

  return '<div class="r-card ' + status + '">'
    + '<div class="r-id">#' + idShort + '</div>'
    + '<div class="r-head">'
    + '<div class="r-time">' + escHtml(b.start_time || '') + (b.end_time ? '<span style="font-size:13px;color:#94a3b8;font-weight:500;margin-left:4px">〜' + escHtml(b.end_time) + '</span>' : '') + '</div>'
    + '<div class="r-party">' + escHtml(b.party_size || '?') + '名</div>'
    + '<div class="r-status ' + status + '">' + (STATUS_LABELS[status] || status) + '</div>'
    + '</div>'
    + '<dl class="r-info">'
    + '<dt>お名前</dt><dd>' + escHtml(b.name || '') + '</dd>'
    + '<dt>電話</dt><dd>' + (phone ? '<a href="tel:' + escHtml(phoneHref) + '">' + escHtml(phone) + '</a>' : '—') + '</dd>'
    + '<dt>メール</dt><dd>' + (email ? '<a href="mailto:' + escHtml(email) + '">' + escHtml(email) + '</a>' + mailStatusBadge(b) : '—') + '</dd>'
    + (b.course_name ? '<dt>コース</dt><dd>' + escHtml(b.course_name) + '</dd>' : '')
    + (b.note ? '<dt>要望</dt><dd class="note">' + escHtml(b.note) + '</dd>' : '')
    + '</dl>'
    + '<div class="r-actions">' + actions + '</div>'
    + '</div>';
}

// ---- 操作 ----
async function handleAction(id, act) {
  const list = monthBookings[selectedDate] || [];
  const target = list.find(b => b.id === id);
  if (!target) return;

  if (act === 'resend_email') {
    if (!confirm('このお客様にメールを再送信しますか？')) return;
    await sendConfirmationMail(target, { isResend: true });
    return;
  }

  let updates = {};
  let confirmMsg = null;
  if (act === 'confirm') {
    updates = { status: 'confirmed', confirmed_at: Date.now() };
  } else if (act === 'cancel') {
    confirmMsg = 'この予約をキャンセル扱いにします。よろしいですか？';
    updates = { status: 'cancelled', cancelled_at: Date.now() };
  } else if (act === 'no_show') {
    confirmMsg = '来店なし（no-show）として記録します。よろしいですか？';
    updates = { status: 'no_show', no_show_at: Date.now() };
  } else if (act === 'revert_pending') {
    updates = { status: 'pending' };
  }
  if (confirmMsg && !confirm(confirmMsg)) return;
  try {
    await update(ref(db, 'tenants/' + TENANT_ID + '/reservations/' + selectedDate + '/' + id), updates);
    Object.assign(target, updates);
    renderAll();
    showToast('✓ 更新しました', true);
  } catch (e) {
    showToast('更新失敗: ' + e.message, false);
    return;
  }

  if (act === 'confirm' && !target.email_sent_at) {
    await sendConfirmationMail(target, { isResend: false });
  }
}

async function sendConfirmationMail(target, opts) {
  const isResend = opts && opts.isResend;
  if (!target.email) {
    if (isResend) showToast('メールアドレスが登録されていません', false);
    else showToast('（メアド未登録のため送信なし）', true);
    return;
  }
  const endpoint = (SETTINGS && SETTINGS.email_endpoint) || '';
  if (!endpoint) {
    if (isResend) showToast('settings.html でGAS Web App URLを設定してください', false);
    else showToast('（メール送信エンドポイント未設定）', true);
    return;
  }

  const id = target.id;
  const reservationNo = id.slice(-6).toUpperCase();
  const timeSlotStr = (target.start_time && target.end_time)
    ? (target.start_time + '-' + target.end_time)
    : (target.start_time || '');
  const body = JSON.stringify({
    tenant_id: TENANT_ID,
    reservation_id: id,
    date: target.date,
    time_slot: timeSlotStr,
    party_size: target.party_size,
    email: target.email,
    name: target.name,
    reservation_no: reservationNo
  });

  let result = null;
  let errorText = '';
  try {
    const res = await fetch(endpoint, { method: 'POST', body: body, redirect: 'follow' });
    if (!res.ok) {
      errorText = 'http_' + res.status;
    } else {
      const text = await res.text();
      try { result = JSON.parse(text); }
      catch (e) { errorText = 'invalid_response'; }
    }
  } catch (e) {
    errorText = 'fetch_failed:' + (e && e.message ? e.message : String(e));
  }

  const sentAt = Date.now();
  const ok = !!(result && result.ok);
  if (!ok && !errorText) errorText = (result && result.error) ? String(result.error) : 'unknown';

  try {
    await set(ref(db, 'tenants/' + TENANT_ID + '/email_log/' + target.date + '/' + id), {
      sent_at: sentAt,
      status: ok ? 'sent' : 'failed',
      error: ok ? null : errorText.slice(0, 200)
    });
  } catch (_) { /* ログ書き込み失敗は致命でないので握る */ }

  if (ok) {
    try {
      await update(ref(db, 'tenants/' + TENANT_ID + '/reservations/' + target.date + '/' + id), { email_sent_at: sentAt });
      target.email_sent_at = sentAt;
    } catch (_) { /* */ }
    renderAll();
    showToast(isResend ? '✉ メール再送信完了' : '✉ メール送信完了', true);
  } else {
    renderAll();
    showToast('メール送信失敗：手動連絡してください（' + errorText + '）', false);
  }
}

// ---- 状態遷移 ----
function selectDate(dateStr) {
  selectedDate = dateStr;
  // 別の月を選んだ場合は月をめくる
  const y = parseInt(dateStr.slice(0, 4), 10);
  const m = parseInt(dateStr.slice(5, 7), 10);
  if (y !== currentYear || m !== currentMonth) {
    currentYear = y;
    currentMonth = m;
    loadMonth(currentYear, currentMonth);
    return;
  }
  renderAll();
}

window.changeMonth = (delta) => {
  const d = new Date(currentYear, currentMonth - 1 + delta, 1);
  currentYear = d.getFullYear();
  currentMonth = d.getMonth() + 1;
  // 月をめくった場合の選択日：その月の1日に切替（既に月内に選択日があれば維持）
  const sel = new Date(selectedDate + 'T00:00:00');
  if (sel.getFullYear() !== currentYear || sel.getMonth() + 1 !== currentMonth) {
    selectedDate = dateOf(currentYear, currentMonth, 1);
  }
  loadMonth(currentYear, currentMonth);
};

window.goToday = () => {
  selectedDate = todayStr();
  const d = new Date();
  const y = d.getFullYear(), m = d.getMonth() + 1;
  if (y !== currentYear || m !== currentMonth) {
    currentYear = y;
    currentMonth = m;
    loadMonth(currentYear, currentMonth);
  } else {
    renderAll();
  }
};

function renderAll() {
  renderCalendar();
  renderDayHeader();
  renderListAndSummary();
}

(async () => {
  await loadSettings();
  await loadMonth(currentYear, currentMonth);
  // ハッシュ #list があれば予約リスト位置までスムーススクロール
  // （POSキッチンのバッジから飛んできて、すぐ未承認一覧を見たい場合等）
  if (window.location.hash === '#list') {
    setTimeout(() => {
      const el = document.getElementById('day-list-header');
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 250);
  }
})();
</script>
