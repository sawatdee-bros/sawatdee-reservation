<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予約設定 - サワディーブロス</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding-bottom: 60px; }

header { background: #1e293b; padding: 14px 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
.back-btn { color: #94a3b8; text-decoration: none; font-size: 20px; line-height: 1; }
header h1 { font-size: 18px; font-weight: 600; color: #f1f5f9; flex: 1; }
.save-btn { padding: 8px 18px; background: #166534; border: none; border-radius: 8px; color: white; font-size: 14px; font-weight: 600; cursor: pointer; }
.save-btn:disabled { background: #334155; color: #64748b; cursor: default; }

.loading { text-align: center; padding: 60px; color: #64748b; }
.toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: #166534; color: white; padding: 10px 24px; border-radius: 20px; font-size: 14px; font-weight: 600; display: none; z-index: 200; white-space: nowrap; }
.toast.show { display: block; }
.toast.error { background: #991b1b; }

.section { margin: 16px; }
.section-title { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; padding: 0 4px; }
.card { background: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: hidden; }
.field-row { display: flex; align-items: center; padding: 14px 16px; gap: 12px; border-bottom: 1px solid #334155; }
.field-row:last-child { border-bottom: none; }
.field-label { flex: 1; font-size: 14px; color: #f1f5f9; }
.field-sub { font-size: 11px; color: #64748b; margin-top: 2px; }
.field-input { background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; padding: 8px 12px; font-size: 14px; font-family: inherit; }
.field-input:focus { outline: none; border-color: #166534; }

.slot-row { display: grid; grid-template-columns: 1fr 1fr 1fr 40px; gap: 8px; padding: 10px 16px; align-items: center; border-bottom: 1px solid #334155; }
.slot-row:last-of-type { border-bottom: none; }
.slot-head { display: grid; grid-template-columns: 1fr 1fr 1fr 40px; gap: 8px; padding: 8px 16px; font-size: 11px; color: #64748b; letter-spacing: 0.05em; }
.slot-input { background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; padding: 8px; font-size: 14px; font-family: inherit; width: 100%; }
.slot-input:focus { outline: none; border-color: #166534; }
.icon-btn { background: transparent; border: 1px solid #334155; border-radius: 8px; color: #94a3b8; padding: 6px 10px; cursor: pointer; font-size: 14px; }
.icon-btn:hover { border-color: #ef4444; color: #ef4444; }
.add-btn { width: calc(100% - 32px); margin: 12px 16px; padding: 10px; border: 1px dashed #94a3b8; border-radius: 8px; background: transparent; color: #64748b; font-size: 13px; cursor: pointer; }
.add-btn:hover { border-color: #166534; color: #166534; }

.closed-list { padding: 8px 16px; display: flex; flex-wrap: wrap; gap: 8px; }
.closed-chip { background: #0f172a; border: 1px solid #334155; border-radius: 999px; padding: 6px 12px; font-size: 13px; display: inline-flex; align-items: center; gap: 8px; }
.closed-chip .x { cursor: pointer; color: #94a3b8; font-size: 16px; line-height: 1; }
.closed-chip .x:hover { color: #ef4444; }
.empty { padding: 20px 16px; color: #64748b; font-size: 13px; text-align: center; }

.add-closed-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #334155; }
.add-closed-row input { flex: 1; }
.add-closed-row button { padding: 8px 14px; background: #166534; border: none; border-radius: 8px; color: white; font-size: 13px; font-weight: 600; cursor: pointer; }

.note { padding: 12px 16px; font-size: 12px; color: #94a3b8; line-height: 1.5; background: #0f172a; border-top: 1px solid #334155; }
</style>
</head>
<body>

<header>
  <a class="back-btn" href="admin.html" title="戻る">←</a>
  <h1>📅 予約設定</h1>
  <button class="save-btn" id="save-btn" onclick="saveAll()">保存する</button>
</header>

<div class="toast" id="toast">✓ 保存しました</div>

<div id="loading" class="loading">読み込み中...</div>

<main id="main" style="display:none">

  <div class="section">
    <div class="section-title">受付時間帯</div>
    <div class="card">
      <div class="slot-head">
        <div>開始</div><div>終了</div><div>最大組数</div><div></div>
      </div>
      <div id="slots-container"></div>
      <button class="add-btn" onclick="addSlot()">＋ 時間帯を追加</button>
      <div class="note">枠ごとに「最大組数」を設定。客はこの時間帯から選択する。<br>営業日切替時刻はPOSの店舗設定（store_config/day_start_hour）に従う。</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">休業日</div>
    <div class="card">
      <div id="closed-container" class="closed-list"></div>
      <div class="add-closed-row">
        <input id="closed-date-input" class="field-input" type="date" style="flex:1">
        <button onclick="addClosedDate()">追加</button>
      </div>
      <div class="note">指定日は予約を受け付けない。</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">受付ルール</div>
    <div class="card">
      <div class="field-row">
        <div class="field-label">
          受付期限
          <div class="field-sub">来店時刻の何分前まで予約可能か</div>
        </div>
        <input id="accept-minutes" class="field-input" type="number" min="0" max="1440" step="15" style="width:90px;text-align:right">
        <span style="font-size:13px;color:#64748b">分前</span>
      </div>
    </div>
  </div>

</main>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, get, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FC = {
  apiKey: 'AIzaSyBVfIZ_pUXqNAUljPBdsNlmVxkPEjvtUZQ',
  authDomain: 'sawatdee-bros.firebaseapp.com',
  databaseURL: 'https://sawatdee-bros-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId: 'sawatdee-bros',
  storageBucket: 'sawatdee-bros.firebasestorage.app',
  messagingSenderId: '1026345346676',
  appId: '1:1026345346676:web:98478c02d3dfbae3df310e'
};
const TENANT_ID = 'sawatdee-bros';
const SETTINGS_PATH = 'tenants/' + TENANT_ID + '/reservation_settings';

const app = initializeApp(FC);
const db = getDatabase(app);

const DEFAULTS = {
  time_slots: [
    { start: '17:00', end: '17:30', capacity: 4 },
    { start: '17:30', end: '18:00', capacity: 4 },
    { start: '18:00', end: '18:30', capacity: 4 },
    { start: '18:30', end: '19:00', capacity: 4 },
    { start: '19:00', end: '19:30', capacity: 4 },
    { start: '19:30', end: '20:00', capacity: 4 },
    { start: '20:00', end: '20:30', capacity: 4 }
  ],
  closed_dates: [],
  accept_until_minutes_before: 60
};

let state = { time_slots: [], closed_dates: [], accept_until_minutes_before: 60 };

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', !!isError);
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function renderSlots() {
  const c = document.getElementById('slots-container');
  c.innerHTML = '';
  state.time_slots.forEach((slot, i) => {
    const row = document.createElement('div');
    row.className = 'slot-row';
    row.innerHTML =
      '<input class="slot-input" type="time" value="' + slot.start + '" data-i="' + i + '" data-k="start">' +
      '<input class="slot-input" type="time" value="' + slot.end + '" data-i="' + i + '" data-k="end">' +
      '<input class="slot-input" type="number" min="1" max="99" value="' + slot.capacity + '" data-i="' + i + '" data-k="capacity">' +
      '<button class="icon-btn" data-rm="' + i + '" title="削除">×</button>';
    c.appendChild(row);
  });
  c.querySelectorAll('input').forEach(el => {
    el.addEventListener('change', e => {
      const i = parseInt(e.target.dataset.i);
      const k = e.target.dataset.k;
      let v = e.target.value;
      if (k === 'capacity') v = Math.max(1, parseInt(v) || 1);
      state.time_slots[i][k] = v;
    });
  });
  c.querySelectorAll('button[data-rm]').forEach(btn => {
    btn.addEventListener('click', e => {
      const i = parseInt(e.target.dataset.rm);
      state.time_slots.splice(i, 1);
      renderSlots();
    });
  });
}

window.addSlot = function() {
  const last = state.time_slots[state.time_slots.length - 1];
  const start = last ? last.end : '17:00';
  const cap = last ? last.capacity : 4;
  state.time_slots.push({ start, end: bumpHalfHour(start), capacity: cap });
  renderSlots();
};

function bumpHalfHour(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  const total = h * 60 + m + 30;
  const nh = Math.min(23, Math.floor(total / 60));
  const nm = total % 60;
  return String(nh).padStart(2, '0') + ':' + String(nm).padStart(2, '0');
}

function renderClosedDates() {
  const c = document.getElementById('closed-container');
  if (state.closed_dates.length === 0) {
    c.innerHTML = '<div class="empty">休業日は登録されていません</div>';
    return;
  }
  c.innerHTML = '';
  state.closed_dates.slice().sort().forEach(d => {
    const chip = document.createElement('span');
    chip.className = 'closed-chip';
    chip.innerHTML = d + ' <span class="x" data-d="' + d + '">×</span>';
    c.appendChild(chip);
  });
  c.querySelectorAll('.x').forEach(el => {
    el.addEventListener('click', e => {
      const d = e.target.dataset.d;
      state.closed_dates = state.closed_dates.filter(x => x !== d);
      renderClosedDates();
    });
  });
}

window.addClosedDate = function() {
  const inp = document.getElementById('closed-date-input');
  const v = inp.value;
  if (!v) return;
  if (state.closed_dates.indexOf(v) === -1) {
    state.closed_dates.push(v);
    renderClosedDates();
  }
  inp.value = '';
};

window.saveAll = async function() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  try {
    state.accept_until_minutes_before = Math.max(0, parseInt(document.getElementById('accept-minutes').value) || 0);
    state.time_slots.forEach(s => {
      if (!/^\d{2}:\d{2}$/.test(s.start)) throw new Error('時刻形式が不正です: ' + s.start);
      if (!/^\d{2}:\d{2}$/.test(s.end)) throw new Error('時刻形式が不正です: ' + s.end);
      if (s.end <= s.start) throw new Error('終了は開始より後に: ' + s.start + '-' + s.end);
      if (!(s.capacity >= 1)) throw new Error('最大組数は1以上');
    });
    await set(ref(db, SETTINGS_PATH), state);
    showToast('✓ 保存しました');
  } catch (e) {
    showToast('保存失敗: ' + e.message, true);
  } finally {
    btn.disabled = false;
  }
};

(async function init() {
  try {
    const snap = await get(ref(db, SETTINGS_PATH));
    const cfg = snap.val();
    if (cfg && cfg.time_slots) {
      state.time_slots = Array.isArray(cfg.time_slots) ? cfg.time_slots : [];
      state.closed_dates = Array.isArray(cfg.closed_dates) ? cfg.closed_dates : [];
      state.accept_until_minutes_before = typeof cfg.accept_until_minutes_before === 'number' ? cfg.accept_until_minutes_before : 60;
    } else {
      state = JSON.parse(JSON.stringify(DEFAULTS));
    }
    document.getElementById('accept-minutes').value = state.accept_until_minutes_before;
    renderSlots();
    renderClosedDates();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
  } catch (e) {
    document.getElementById('loading').textContent = '読み込み失敗: ' + e.message;
  }
})();
</script>

</body>
</html>
